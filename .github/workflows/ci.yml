name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Nix flake check
        run: nix flake check

      - name: Nix flake build
        run: nix build

      - name: Ruff
        run: nix run nixpkgs#ruff -- check

      - name: Pyright
        run: nix run nixpkgs#pyright

      - name: Ty
        run: nix run nixpkgs#ty -- check .

      - name: Pyupgrade
        run: |
          nix run nixpkgs#pyupgrade -- --py314-plus scripts/*.py
          git diff --exit-code
